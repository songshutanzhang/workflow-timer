  // 倒计时/任务组 共用：数字、进度条
  function renderCountdownTime(timeEl, labelEl, progress, progressBar, isGroup) {
    if (State.countdown.finished) {
      timeEl.innerHTML = '00:00:00';
      timeEl.className = 'display-time done';
      progress.style.display = 'none';
    } else if (State.countdown.running) {
      timeEl.innerHTML = fmtTime(State.countdown.remaining);
      let timeCls = 'display-time';
      if (State.group.overtime) timeCls += ' overtime-running';
      else if (State.countdown.remaining < 10 && State.countdown.remaining > 0) timeCls += ' warn';
      timeEl.className = timeCls;
      if (State.countdown.duration > 0) {
        progress.style.display = 'block';
        const rawPct = ((State.countdown.duration - State.countdown.remaining) / State.countdown.duration) * 100;
        progressBar.style.width = Math.min(100, rawPct) + '%';
      } else {
        progress.style.display = 'none';
      }
    } else if (State.countdown.remaining > 0 && State.countdown.remaining < State.countdown.duration && !State.group.active) {
      // 已启动过（暂停/运行）：显示进度条 + 已完成比例
      timeEl.innerHTML = fmtTime(State.countdown.remaining);
      // 暂停时加 .paused 触发呼吸；运行时不加
      timeEl.className = State.countdown.running ? 'display-time' : 'display-time paused';
      if (State.countdown.duration > 0) {
        progress.style.display = 'block';
        const usedPct = ((State.countdown.duration - State.countdown.remaining) / State.countdown.duration) * 100;
        progressBar.style.width = Math.min(100, usedPct) + '%';
      }
    } else {
      // idle
      let secs;
      if (isGroup || State.group.active) {
        // 任务组活跃时，倒计时 tab 也不显示任何数字（避免和任务组混淆/污染）
        secs = 0;
      } else {
        secs = getInputSeconds();
        if (State.activeTaskId) {
          const found = findTask(State.activeTaskId);
          if (found) secs = found.task.standard;
        }
      }
      timeEl.innerHTML = fmtTime(secs);
      timeEl.className = secs === 0 ? 'display-time idle' : 'display-time';
      progress.style.display = 'none';
    }
  }

  function renderGroupDisplay(labelEl, timeEl, progress, progressBar, actualEl) {
    const inGroup = State.group.active;
    const cur = inGroup ? State.group.tasks[State.group.currentIndex] : null;
    const found = State.activeTaskId ? findTask(State.activeTaskId) : null;

    // label
    if (cur) labelEl.textContent = `${cur.name} · 第 ${State.group.currentIndex + 1} / ${State.group.tasks.length} 项`;
    else if (found) labelEl.textContent = `${found.task.name} · ${found.group.name}`;
    else labelEl.textContent = '— 请先创建或选择任务组 —';

    // 数字（任务组使用独立 itemRemaining，与普通倒计时完全隔离）
    if (inGroup) {
      timeEl.innerHTML = fmtTime(State.group.itemRemaining);
      // 暂停时加 .paused 触发呼吸
      const baseCls = State.group.overtime ? 'overtime-running' : 'display-time';
      timeEl.className = (!State.group.running) ? baseCls + ' paused' : baseCls;
      let timeCls = 'display-time';
      if (State.group.overtime) timeCls += ' overtime-running';
      else if (State.group.itemRemaining < 10 && State.group.itemRemaining > 0) timeCls += ' warn';
      timeEl.className = timeCls;
      if (State.group.itemDuration > 0) {
        progress.style.display = 'block';
        const rawPct = ((State.group.itemDuration - State.group.itemRemaining) / State.group.itemDuration) * 100;
        progressBar.style.width = Math.min(100, rawPct) + '%';
      } else {
        progress.style.display = 'none';
      }
    } else if (found) {
      timeEl.innerHTML = fmtTime(found.task.standard);
      timeEl.className = 'display-time idle';
      progress.style.display = 'none';
    } else {
      timeEl.innerHTML = '00:00:00';
      timeEl.className = 'display-time idle';
      progress.style.display = 'none';
    }

    // 实际用时
    if (inGroup) {
      const target = cur;
      const a = target ? State.actualTimes[target.id] : undefined;
      if (a !== undefined) {
        let cls = 'display-actual';
        if (State.countdown.running) cls += ' live';
        if (State.group.overtime) cls = 'display-actual overtime-val';
        actualEl.textContent = `实际用时 ${fmtTime(a)}`;
        actualEl.className = cls;
        actualEl.style.display = 'block';
      } else {
        actualEl.style.display = 'none';
      }
    } else if (found) {
      const a = State.actualTimes[found.task.id];
      if (a !== undefined) {
        actualEl.textContent = `上次用时 ${fmtTime(a)}`;
        actualEl.className = 'display-actual';
        actualEl.style.display = 'block';
      } else {
        actualEl.style.display = 'none';
      }
    } else {
      actualEl.style.display = 'none';
    }

    return { inGroup, cur, found };
  }

  function renderStopwatchControls() {
    const swStart = document.getElementById('btn-start-sw');
    const lapBtn = document.getElementById('btn-lap');
    if (State.stopwatch.running) {
      swStart.innerHTML = '⏸ 暂停';
      swStart.classList.add('running');
      lapBtn.disabled = false;
    } else {
      swStart.classList.remove('running');
      swStart.innerHTML = State.stopwatch.elapsed > 0 ? '▶ 继续' : '▶ 开始';
      // 暂停态：elapsed > 0 且未分过段 才能再次分段
      lapBtn.disabled = !(State.stopwatch.elapsed > 0 && !State.stopwatch.lapWhilePaused);
    }
  }

  function renderGroupControls(ctx) {
    const { inGroup, cur, found } = ctx;
    const grpStart = document.getElementById('btn-start-grp');
    const prevBtn = document.getElementById('btn-prev-task');
    const nextBtn = document.getElementById('btn-next-task');
    const stopBtn = document.getElementById('btn-stop-group');

    // 默认按钮可用（在 inGroup 状态下）
    grpStart.disabled = false;

    if (inGroup) {
      // 运行中（任务组独立暂停/继续标志）
      if (State.group.running) {
        grpStart.innerHTML = '⏸ 暂停';
        grpStart.classList.add('running');
      } else {
        grpStart.classList.remove('running');
        grpStart.innerHTML = State.group.itemRemaining > 0 ? '▶ 继续' : '▶ 开始';
      }
      // 端头保护
      prevBtn.disabled = State.group.currentIndex <= 0;
      const isLast = State.group.currentIndex >= State.group.tasks.length - 1;
      if (isLast) {
        nextBtn.textContent = '⏹ 完成';
        nextBtn.classList.remove('btn-warn');
        nextBtn.classList.add('btn-secondary');
      } else {
        nextBtn.textContent = '⏭ 下一项';
        nextBtn.classList.remove('btn-warn');
        nextBtn.classList.add('btn-secondary');
      }
      nextBtn.disabled = false;
      stopBtn.style.display = 'inline-flex';
    } else {
      // 未运行
      grpStart.classList.remove('running');
      grpStart.innerHTML = '▶ 开始';
      // 未选任务时不允许启动
      grpStart.disabled = !found;
      // 未启动但已选任务组：prev/next 启用（让用户预览/切换预选）
      const selIdx = found ? found.group.tasks.findIndex(x => x.id === State.activeTaskId) : -1;
      prevBtn.disabled = !found || selIdx <= 0;
      nextBtn.style.display = 'inline-flex';
      nextBtn.textContent = (found && selIdx >= found.group.tasks.length - 1) ? '⏯ 启动' : '⏭ 下一项';
      nextBtn.classList.add('btn-secondary');
      nextBtn.classList.remove('btn-warn');
      nextBtn.disabled = !found;
      stopBtn.style.display = 'none';
    }
  }

  function fmtCustomLabel(secs) {
    if (secs < 60) return `0:${String(secs).padStart(2, '0')}`;
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return s === 0 ? `${m}:00` : `${m}:${String(s).padStart(2, '0')}`;
  }
  function renderCustomQuicks() {
    const box = document.getElementById('custom-quick-list');
    if (!box) return;
    if (!State.customQuicks.length) { box.innerHTML = ''; return; }
    box.innerHTML = State.customQuicks.map(c => `
      <span class="group-pill" data-custom-use="${c.secs}" title="点击设置 ${fmtCustomLabel(c.secs)}" style="cursor:pointer">
        ${fmtCustomLabel(c.secs)}
        <span data-custom-del="${c.id}" style="margin-left:4px;cursor:pointer;opacity:0.6;font-size:10px" title="删除">🗑</span>
      </span>
    `).join('');
  }

  // ============== 渲染：右栏 ==============
  function renderRightPanel() {
    if (State.mode === 'stopwatch') renderLaps();
    if (State.mode === 'countdown') renderCustomQuicks();
  }

  function renderLaps() {
    const laps = State.stopwatch.laps;
    const el = document.getElementById('laps');
    const cur = document.getElementById('info-sw-current');
    const cnt = document.getElementById('info-sw-laps');
    const fast = document.getElementById('info-sw-fastest');
    const slow = document.getElementById('info-sw-slowest');
    const avg = document.getElementById('info-sw-avg');
    if (cur) cur.innerHTML = fmtTimeMs(getStopwatchDisplayMs());
    if (cnt) cnt.textContent = laps.length;

    if (!laps.length) {
      el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-faint);font-size:11px;">暂无记录</div>';
      if (fast) fast.textContent = '—';
      if (slow) slow.textContent = '—';
      if (avg) avg.textContent = '—';
      return;
    }
    el.innerHTML = '';
    let prev = 0;
    const deltas = [];
    laps.forEach((t, i) => {
      const delta = t - prev;
      deltas.push(delta);
      prev = t;
      const item = document.createElement('div');
      item.className = 'lap-item';
      const deltaText = i === 0 ? '首段' : `+${fmtTimeMs(delta)}`;
      item.innerHTML = `<span class="lap-num">#${i+1}</span><span class="lap-time">${fmtTimeMs(t)}</span><span class="lap-delta">${deltaText}</span>`;
      el.appendChild(item);
    });
    const minD = Math.min(...deltas);
    const maxD = Math.max(...deltas);
    const avgD = deltas.reduce((a, b) => a + b, 0) / deltas.length;
    if (fast) fast.innerHTML = fmtTimeMs(minD);
    if (slow) slow.innerHTML = fmtTimeMs(maxD);
    if (avg) avg.innerHTML = fmtTimeMs(avgD);
  }

  function render() {
    renderTabs();
    renderGroups();
    renderDisplay();
    renderRightPanel();
  }

  // ============== 倒计时逻辑 ==============
  function startCountdown() {
    if (State.countdown.finished) resetCountdown(true);
    if (!State.countdown.running) {
      // 仅在 idle (未启动过) 才用 input 预设值；已启动过的剩余时间继续倒计时
      const cdIdle = State.countdown.remaining === 0
        || (State.countdown.remaining === State.countdown.duration && State.countdown.duration > 0);
      if (cdIdle) {
        const secs = getInputSeconds();
        if (secs <= 0) { toast('请先设置时长', 'warn'); return; }
        State.countdown.duration = secs;
        State.countdown.remaining = secs;
        // 避免被任务组污染：从 input 全新启动，与 group 完全独立
        State.activeTaskId = null;
      }
      State.countdown.running = true;
      State.countdown.lastTick = performance.now();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      // 任务组：初始化 lastTick
      if (State.group.active && State.group.lastTick === 0) {
        State.group.lastTick = performance.now();
      }
    } else {
      State.countdown.running = false;
    }
    save();
    render();
  }

  function resetCountdown(keepInput = false) {
    State.countdown.running = false;
    State.countdown.finished = false;
    State.countdown.remaining = 0;
    State.countdown.duration = 0;
    if (keepInput) {
      const secs = getInputSeconds();
      State.countdown.remaining = secs;
      State.countdown.duration = secs;
    }
    if (State.group.active) {
      State.group.overtime = false;
      State.group.lastTick = 0;
    }
    render();
    save();
  }

  function tickCountdown() {
    const now = performance.now();
    // 任务组模式：增量累加到 actualTimes（独立于普通倒计时，可同时跑）
    if (State.group.active && State.group.running) {
      const cur = State.group.tasks[State.group.currentIndex];
      if (cur) {
        if (State.group.lastTick === 0) State.group.lastTick = now;
        const delta = (now - State.group.lastTick) / 1000;
        State.group.lastTick = now;
        State.actualTimes[cur.id] = (State.actualTimes[cur.id] || 0) + delta;
        // 独立计算任务组项剩余（不修改 State.countdown.remaining）
        State.group.itemRemaining = cur.standard - State.actualTimes[cur.id];
        State.group.itemDuration = cur.standard;
        if (!State.group.overtime && State.group.itemRemaining <= 0) {
          State.group.overtime = true;
          toast('⏰ 本项标准时间到，可继续累计或切到下一项。', 'warn');
          beep([880, 0.2, 0, 0.1, 660, 0.3]);
        }
      }
    }
    // 普通倒计时模式：remaining 减少（与任务组完全隔离，可同时跑）
    if (State.countdown.running) {
      const delta = (now - State.countdown.lastTick) / 1000;
      State.countdown.lastTick = now;
      State.countdown.remaining -= delta;
      if (State.countdown.remaining <= 0 && !State.countdown.finished) {
        State.countdown.remaining = 0;
        State.countdown.running = false;
        State.countdown.finished = true;
        beep([880, 0.3, 0, 0.1, 1320, 0.5]);
        toast('⏰ 时间到！', 'success');
      }
    }
  }

  // ============== 任务组：核心操作 ==============

  // 启动一整组（从 activeTaskId 指定的子任务开始；前面 task 的累计清空）
  function startGroup(groupId) {
    const g = State.groups.find(x => x.id === groupId);
    if (!g || !g.tasks.length) { toast('请先添加子任务', 'warn'); return; }
    if (State.mode !== 'tasks') State.mode = 'tasks';
    State.group.active = true;
    State.group.groupId = g.id;
    State.group.tasks = g.tasks;  // 引用，编辑后实时生效
    // 决定起始子任务：优先 activeTaskId（如果属于该组），否则从第一项
    let startIdx = 0;
    if (State.activeTaskId) {
      const idx = g.tasks.findIndex(x => x.id === State.activeTaskId);
      if (idx >= 0) startIdx = idx;
    }
    State.group.currentIndex = startIdx;
    State.group.overtime = false;
    // 前面 task 的累计清空（已经被跳过的）
    g.tasks.forEach((t, i) => { if (i < startIdx) delete State.actualTimes[t.id]; });
    const startTask = State.group.tasks[startIdx];
    State.activeTaskId = startTask.id;
    // 不动 State.countdown（保持普通倒计时独立）
    State.group.lastTick = performance.now();
    State.group.running = true;
    const elapsed = State.actualTimes[startTask.id] || 0;
    State.group.itemRemaining = Math.max(0, startTask.standard - elapsed);
    State.group.itemDuration = startTask.standard;
    State.group.overtime = elapsed >= startTask.standard;
    render();
    save();
    const prefix = startIdx > 0 ? `（第 ${startIdx + 1} 项开始）` : '';
    toast(`开始：${g.name} · ${startTask.name}${prefix}`, 'success');
  }

  // 切换到指定 task（保留 actualTimes 累计）
  // 支持跨组：如果 task 不在当前组，切换 group
  // 切项后默认暂停（让用户主动点 ▶ 继续）
  function switchToTask(taskId) {
    const found = findTask(taskId);
    if (!found) return;
    const t = found.task;

    // 跨组：切换到新组
    if (!State.group.active || State.group.groupId !== found.group.id) {
      if (State.mode !== 'tasks') State.mode = 'tasks';
      State.group.active = true;
      State.group.groupId = found.group.id;
      State.group.tasks = found.group.tasks;  // 引用
    }

    const idx = State.group.tasks.findIndex(x => x.id === taskId);
    if (idx < 0) return;
    State.group.currentIndex = idx;
    State.activeTaskId = taskId;
    State.countdown.duration = t.standard;
    // 关键：remaining = standard - 累计用时 (actualTimes 保留)
    const elapsed = State.actualTimes[t.id] || 0;
    State.countdown.remaining = Math.max(0, t.standard - elapsed);
    State.countdown.finished = false;
    State.group.overtime = elapsed >= t.standard;
    // 任务组独立的 itemRemaining/itemDuration：切项后必须立即同步新子任务的时间
    State.group.itemDuration = t.standard;
    State.group.itemRemaining = Math.max(0, t.standard - elapsed);
    // 切项后默认暂停（让用户主动点 ▶ 继续）
    State.group.running = false;
    State.countdown.running = false;
    State.group.lastTick = 0;
    render();
    save();
  }

  function nextTask() {
    // 未启动时：找到当前 activeTaskId 所属组，跳到下一项（选但不启动）
    if (!State.group.active) {
      if (!State.activeTaskId) { toast('请先选中一个任务组', 'warn'); return; }
      const found = findTask(State.activeTaskId);
      if (!found) return;
      const idx = found.group.tasks.findIndex(x => x.id === State.activeTaskId);
      if (idx < 0) return;
      const next = found.group.tasks[idx + 1];
      if (next) { selectTask(next.id); return; }
      // 已到最后一项：直接启动当前组（从 curIdx=0 开始）
      startGroup(found.group.id);
      return;
    }
    const isLast = State.group.currentIndex >= State.group.tasks.length - 1;
    if (isLast) {
      // 最后一项：完成全部
      onGroupComplete();
      return;
    }
    const nextIdx = State.group.currentIndex + 1;
    const next = State.group.tasks[nextIdx];
    switchToTask(next.id);
    toast(`→ ${next.name}`);
  }
  function prevTask() {
    if (!State.group.active) {
      if (!State.activeTaskId) { toast('请先选中一个任务组', 'warn'); return; }
      const found = findTask(State.activeTaskId);
      if (!found) return;
      const idx = found.group.tasks.findIndex(x => x.id === State.activeTaskId);
      if (idx <= 0) return;
      const prev = found.group.tasks[idx - 1];
      if (prev) selectTask(prev.id);
      return;
    }
    if (State.group.currentIndex <= 0) return;  // 端头保护
    const prevIdx = State.group.currentIndex - 1;
    const prev = State.group.tasks[prevIdx];
    switchToTask(prev.id);
    toast(`← ${prev.name}`);
  }
  function onGroupComplete() {
    // 记录当前项后停止
    if (State.group.startTs > 0) {
      const elapsed = (performance.now() - State.group.startTs) / 1000;
      const cur = State.group.tasks[State.group.currentIndex];
      if (cur) State.actualTimes[cur.id] = elapsed;
    }
    State.group.active = false;
    State.group.groupId = null;
    State.group.tasks = [];
    State.group.currentIndex = 0;
    State.group.overtime = false;
    State.group.lastTick = 0;
    State.countdown.running = false;
    beep([523, 0.2, 0, 0.1, 659, 0.2, 0, 0.1, 784, 0.2, 0, 0.1, 1047, 0.6]);
    toast('🎉 全部完成！', 'success');
    render();
    save();
  }

  // 结束全部（停止任务组）
  function stopGroup() {
    if (State.group.active) beep([523, 0.2, 0, 0.1, 659, 0.4]);
    State.group.active = false;
    State.group.groupId = null;
    // queue 是 tasks 引用，不需要清空
    State.group.currentIndex = 0;
    State.group.overtime = false;
    State.group.lastTick = 0;
    State.countdown.running = false;
    toast('已结束全部');
    render();
    save();
  }

  function clearAllActuals() {
    if (!confirm('确定清空所有任务的实际用时记录？')) return;
    State.actualTimes = {};
    render();
    save();
    toast('已清空');
  }

  // ============== 单次任务（从组里点击子任务，未启动组） ==============
  function selectTask(taskId) {
    // 未启动：仅预览（设 activeTaskId + cd 状态），不激活 group
    if (!State.group.active) {
      const found = findTask(taskId);
      if (!found) return;
      State.activeTaskId = taskId;
      State.countdown.duration = found.task.standard;
      State.countdown.remaining = found.task.standard;
      State.countdown.finished = false;
      State.countdown.running = false;
      setCountdownInput(found.task.standard);
      render();
      save();
      return;
    }
    // 运行中：跳到任意项
    if (State.group.tasks[State.group.currentIndex]?.id === taskId) return;
    switchToTask(taskId);
  }

  function selectGroup(groupId) {
    if (State.group.active) { toast('任务组进行中，请先停止', 'warn'); return; }
    const g = State.groups.find(x => x.id === groupId);
    if (!g) return;
    if (State.mode !== 'tasks') State.mode = 'tasks';
    if (g.tasks.length) {
      const first = g.tasks[0];
      State.activeTaskId = first.id;
      setCountdownInput(first.standard);
      State.countdown.duration = first.standard;
      State.countdown.remaining = first.standard;
    } else {
      State.activeTaskId = null;
    }
    State.countdown.running = false;
    State.countdown.finished = false;
    render();
    save();
  }

  // 轮转切换任务组（↑/↓、PgUp/PgDn）
  function shiftGroup(offset) {
    if (!State.groups.length) return;
    if (State.group.active) { toast('任务组进行中，请先停止', 'warn'); return; }
    // 当前组：优先 State.group.groupId（后才用 activeTaskId 推断）
    let curId = State.group.groupId;
    if (!curId && State.activeTaskId) {
      const t = State.groups.flatMap(g => g.tasks).find(x => x.id === State.activeTaskId);
      if (t) curId = State.groups.find(g => g.tasks.includes(t))?.id;
    }
    let idx = curId ? State.groups.findIndex(g => g.id === curId) : -1;
    const n = State.groups.length;
    let newIdx;
    if (idx < 0) {
      newIdx = offset > 0 ? 0 : n - 1;  // 未选中：↓ 跳第一个，↑ 跳最后一个
    } else {
      newIdx = (idx + offset + n) % n;  // 循环
    }
    selectGroup(State.groups[newIdx].id);
  }

  // ============== 秒表 ==============
  function startStopwatch() {
    if (State.stopwatch.running) {
      State.stopwatch.elapsed += performance.now() - State.stopwatch.startedAt;
      State.stopwatch.running = false;
    } else {
      State.stopwatch.startedAt = performance.now();
      State.stopwatch.running = true;
      State.stopwatch.lapWhilePaused = false;  // 恢复运行后允许再次暂停分段
    }
    render();
  }
  function resetStopwatch() {
    State.stopwatch.running = false;
    State.stopwatch.elapsed = 0;
    State.stopwatch.laps = [];
    State.stopwatch.lapWhilePaused = false;
    render();
  }
  function lapStopwatch() {
    // 运行中：直接分段
    if (State.stopwatch.running) {
      const t = State.stopwatch.elapsed + (performance.now() - State.stopwatch.startedAt);
      State.stopwatch.laps.push(t);
      render();
      return;
    }
    // 暂停态：允许一次分段（防止反复分同一时段没意义）
    if (State.stopwatch.elapsed > 0 && !State.stopwatch.lapWhilePaused) {
      State.stopwatch.laps.push(State.stopwatch.elapsed);
      State.stopwatch.lapWhilePaused = true;
      render();
    }
  }
  function tickStopwatch() {
    // 不需操作 state，由 mainLoop render 更新 UI
  }
  function getStopwatchDisplayMs() {
    if (State.stopwatch.running) {
      return State.stopwatch.elapsed + (performance.now() - State.stopwatch.startedAt);
    }
    return State.stopwatch.elapsed;
  }

  // ============== 模态框：组/任务编辑 ==============
  // 导出二级菜单
  function openExportPopover(anchor, groupId) {
    const pop = document.getElementById('export-popover');
    pop.dataset.groupId = groupId;
    pop.classList.add('show');
    // 定位在按钮下方
    const r = anchor.getBoundingClientRect();
    const popW = 160;  // 估算
    let left = r.right - popW;
    let top = r.bottom + 4;
    if (left < 8) left = 8;
    if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
    if (top + 80 > window.innerHeight) top = r.top - 80 - 4;  // 上面空间不够则跳上
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
  }
  function closeExportPopover() {
    const pop = document.getElementById('export-popover');
    pop.classList.remove('show');
    delete pop.dataset.groupId;
  }

  function openGroupModal(group = null) {
    State._editing = { type: 'group', groupId: group?.id || null, draft: group ? group.tasks.map(t => ({...t})) : [] };
    document.getElementById('modal-title').textContent = group ? '编辑任务组' : '新建任务组';
    document.getElementById('form-name').value = group?.name || '';
    document.getElementById('form-tasks-row').style.display = 'block';
    renderFormTasks();
    document.getElementById('modal-bg').classList.add('show');
    document.getElementById('form-name').focus();
  }
  function renderFormTasks() {
    const list = document.getElementById('form-tasks-list');
    list.innerHTML = '';
    State._editing.draft.forEach((t, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:6px';
      const isFirst = i === 0;
      const isLast = i === State._editing.draft.length - 1;
      row.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:2px">
          <button type="button" data-mv="up" data-idx="${i}" style="padding:2px 6px;background:var(--bg-elev-2);color:var(--text-dim);border-radius:3px;font-size:10px;line-height:1" ${isFirst ? 'disabled' : ''} title="上移">↑</button>
          <button type="button" data-mv="down" data-idx="${i}" style="padding:2px 6px;background:var(--bg-elev-2);color:var(--text-dim);border-radius:3px;font-size:10px;line-height:1" ${isLast ? 'disabled' : ''} title="下移">↓</button>
        </div>
        <input class="form-input" data-field="name" data-idx="${i}" value="${escapeHtml(t.name)}" placeholder="子任务名" style="flex:2">
        <div class="time-cell" style="flex:1">
          <input class="form-input" data-field="h" data-idx="${i}" type="number" min="0" max="99" value="${Math.floor(t.standard/3600)}" style="width:100%;padding-right:22px;text-align:center">
          <span class="time-unit">时</span>
        </div>
        <span style="color:var(--text-faint)">:</span>
        <div class="time-cell" style="flex:1">
          <input class="form-input" data-field="m" data-idx="${i}" type="number" min="0" max="59" value="${Math.floor((t.standard%3600)/60)}" style="width:100%;padding-right:22px;text-align:center">
          <span class="time-unit">分</span>
        </div>
        <span style="color:var(--text-faint)">:</span>
        <div class="time-cell" style="flex:1">
          <input class="form-input" data-field="s" data-idx="${i}" type="number" min="0" max="59" value="${t.standard%60}" style="width:100%;padding-right:22px;text-align:center">
          <span class="time-unit">秒</span>
        </div>
        <button type="button" data-rm="${i}" style="padding:6px 8px;color:var(--warn);background:transparent">×</button>
      `;
      list.appendChild(row);
    });
    // 事件
    list.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = +inp.dataset.idx, f = inp.dataset.field;
        if (f === 'name') State._editing.draft[i].name = inp.value;
        else {
          const h = +list.querySelector(`[data-field="h"][data-idx="${i}"]`).value || 0;
          const m = +list.querySelector(`[data-field="m"][data-idx="${i}"]`).value || 0;
          const s = +list.querySelector(`[data-field="s"][data-idx="${i}"]`).value || 0;
          State._editing.draft[i].standard = h*3600 + m*60 + s;
        }
      });
    });
    list.querySelectorAll('[data-rm]').forEach(btn => {
      btn.addEventListener('click', () => {
        State._editing.draft.splice(+btn.dataset.rm, 1);
        renderFormTasks();
      });
    });
    // ↑↓ 调子任务顺序
    list.querySelectorAll('[data-mv]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = +btn.dataset.idx;
        const dir = btn.dataset.mv === 'up' ? -1 : 1;
        const j = i + dir;
        if (j < 0 || j >= State._editing.draft.length) return;
        const tmp = State._editing.draft[i];
        State._editing.draft[i] = State._editing.draft[j];
        State._editing.draft[j] = tmp;
        renderFormTasks();
      });
    });
  }
  function closeModal() {
    document.getElementById('modal-bg').classList.remove('show');
    State._editing = null;
  }
  function saveGroup() {
    const name = document.getElementById('form-name').value.trim();
    if (!name) { toast('请输入组名', 'warn'); return; }
    const draft = State._editing.draft.filter(t => t.name.trim() && t.standard > 0);
    if (draft.length === 0) { toast('请至少添加一个子任务', 'warn'); return; }
    if (State._editing.groupId) {
      const g = State.groups.find(x => x.id === State._editing.groupId);
      g.name = name;
      g.tasks = draft.map(t => ({ id: t.id || uid(), name: t.name, standard: t.standard }));
      toast('已更新', 'success');
    } else {
      State.groups.push({ id: uid(), name, tasks: draft.map(t => ({ id: uid(), name: t.name, standard: t.standard })) });
      toast('已新建', 'success');
    }
    closeModal();
    save();
    render();
  }
  function deleteGroup(id) {
    const g = State.groups.find(x => x.id === id);
    if (!g) return;
    if (!confirm(`确定删除"${g.name}"及其所有子任务？`)) return;
    State.groups = State.groups.filter(x => x.id !== id);
    g.tasks.forEach(t => { delete State.actualTimes[t.id]; });
    if (State.group.groupId === id) stopGroup(true);
    save();
    render();
  }
  function deleteTask(taskId) {
    const found = findTask(taskId);
    if (!found) return;
    if (!confirm(`确定删除"${found.task.name}"？`)) return;
    found.group.tasks = found.group.tasks.filter(t => t.id !== taskId);
    delete State.actualTimes[taskId];
    if (State.activeTaskId === taskId) State.activeTaskId = null;
    save();
    render();
  }
  function moveTask(groupId, taskId, dir) {
    const g = State.groups.find(x => x.id === groupId);
    if (!g) return;
    const i = g.tasks.findIndex(t => t.id === taskId);
    if (i < 0) return;
    const j = i + dir;
    if (j < 0 || j >= g.tasks.length) return;
    [g.tasks[i], g.tasks[j]] = [g.tasks[j], g.tasks[i]];
    save();
    render();
  }

  // ============== 事件 ==============
  function bind() {
    // Tabs
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => setMode(t.dataset.tab));
    });

    document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
    document.getElementById('btn-toggle-right').addEventListener('click', toggleRightPanel);
    document.getElementById('btn-theme').addEventListener('click', () => {
      const cur = document.documentElement.dataset.theme;
      const next = cur === 'dark' ? 'light' : 'dark';
      applyTheme(next, true);
    });
    document.getElementById('btn-help').addEventListener('click', () => {
      alert(`计时器

模式：
  倒计时 
  秒表    
  任务   - 按序执行多个倒计时

快捷键：
  F / F11      - 全屏
  空格         - 开始 / 暂停
  L            - 秒表分段
  1 / 2 / 3    - 切换模式（倒计时/秒表/任务）
  \\           - 展开/收起边栏

  任务组中：
  ← / Home / P  - 上一项
  → / End / N   - 下一项
  ↑ / PageUp    - 上个任务组（循环）
  ↓ / PageDown  - 下个任务组（循环）`);
    });

    // ===== 倒计时控件 =====
    document.getElementById('btn-start').addEventListener('click', () => {
      startCountdown();
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      resetCountdown(true);
    });

    // ===== 秒表控件 =====
    document.getElementById('btn-start-sw').addEventListener('click', startStopwatch);
    document.getElementById('btn-lap').addEventListener('click', () => {
      // 右栏收起时，点“分段”先弹回右栏（分段信息在右栏里）
      if (document.getElementById('main').classList.contains('right-collapsed')) {
        toggleRightPanel();
      }
      lapStopwatch();
    });
    document.getElementById('btn-reset-sw').addEventListener('click', () => {
      if (State.stopwatch.elapsed === 0 && State.stopwatch.laps.length === 0) return;
      resetStopwatch();
    });

    // ===== 任务组 banner 点击 =====
    document.getElementById('group-banner').addEventListener('click', () => {
      if (State.mode !== 'tasks') setMode('tasks');
      // 如果右栏收起，展开
      if (document.getElementById('main').classList.contains('right-collapsed')) {
        toggleRightPanel();
      }
    });

    // ===== 任务组控件 =====
    document.getElementById('btn-start-grp').addEventListener('click', () => {
      if (!State.group.active) {
        // 未运行：启动当前选中的组，或第一个组
        if (State.activeTaskId) {
          const found = findTask(State.activeTaskId);
          if (found) { startGroup(found.group.id); return; }
        }
        if (State.groups.length) startGroup(State.groups[0].id);
        else toast('请先创建一个任务组', 'warn');
        return;
      }
      // 运行中：暂停/继续（任务组独立暂停，不影响普通倒计时）
      if (State.group.running) {
        State.group.running = false;
      } else {
        State.group.running = true;
        State.group.lastTick = performance.now();
      }
      render();
      save();
    });
    document.getElementById('btn-prev-task').addEventListener('click', prevTask);
    document.getElementById('btn-next-task').addEventListener('click', nextTask);
    document.getElementById('btn-stop-group').addEventListener('click', stopGroup);

    // 导出：格式切换
    document.querySelectorAll('.export-format-row').forEach(row => {
      row.addEventListener('click', e => {
        const btn = e.target.closest('.export-format-btn');
        if (!btn) return;
        row.querySelectorAll('.export-format-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    // 导出：秒表
    document.getElementById('btn-export-sw').addEventListener('click', () => {
      const fmt = document.querySelector('#sw-format-row .export-format-btn.active').dataset.format;
      exportStopwatch(fmt);
    });
    // 导出：group-item 上的"📊 导出"按钮（hover 显现）→ 点开二级菜单
    document.getElementById('group-list').addEventListener('click', e => {
      const btn = e.target.closest('[data-action="export-group"]');
      if (!btn) return;
      e.stopPropagation();
      const groupItem = btn.closest('.group-item');
      if (!groupItem) return;
      const groupId = groupItem.dataset.groupId;
      openExportPopover(btn, groupId);
    });
    // 二级菜单选项 click
    document.getElementById('export-popover').addEventListener('click', e => {
      const item = e.target.closest('.export-popover-item');
      if (!item) return;
      const groupId = document.getElementById('export-popover').dataset.groupId;
      const fmt = item.dataset.format;
      closeExportPopover();
      if (groupId) exportGroup(groupId, fmt);
    });
    // 点击其他位置关闭 popover
    document.addEventListener('click', e => {
      const pop = document.getElementById('export-popover');
      if (!pop.classList.contains('show')) return;
      if (e.target.closest('#export-popover') || e.target.closest('[data-action="export-group"]')) return;
      closeExportPopover();
    });

    // pills 点击跳转
    document.getElementById('group-pills').addEventListener('click', e => {
      const pill = e.target.closest('.group-pill');
      if (pill && pill.dataset.taskId) switchToTask(pill.dataset.taskId);
    });

    // 输入
    ['in-h', 'in-m', 'in-s'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        if (!State.countdown.running && !State.countdown.finished && !State.group.active) {
          const secs = getInputSeconds();
          State.countdown.remaining = secs;
          State.countdown.duration = secs;
          render();
          save();
        }
      });
    });

    // 快捷时长（与任务组完全独立：可同时跑）
    document.querySelectorAll('.quick-time-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sec = btn.dataset.sec ? parseInt(btn.dataset.sec) : parseInt(btn.dataset.min) * 60;
        setCountdownInput(sec);
        State.countdown.remaining = sec;
        State.countdown.duration = sec;
        State.activeTaskId = null;
        State.countdown.running = false;  // 重置，倒计时需要点“开始”才跑
        render();
        save();
      });
    });

    // 自定义快捷时长：添加（与任务组完全独立）
    document.getElementById('custom-add-btn').addEventListener('click', () => {
      const m = parseInt(document.getElementById('custom-m').value) || 0;
      const s = parseInt(document.getElementById('custom-s').value) || 0;
      const secs = m * 60 + s;
      if (secs <= 0) { toast('请输入有效的时长', 'warn'); return; }
      // 去重
      if (!State.customQuicks.some(c => c.secs === secs)) {
        State.customQuicks.push({ id: uid(), secs });
        State.customQuicks.sort((a, b) => a.secs - b.secs);
        save();
        renderCustomQuicks();
      }
    });
    // 自定义快捷时长：点击应用
    document.getElementById('custom-quick-list').addEventListener('click', e => {
      const delBtn = e.target.closest('[data-custom-del]');
      const useBtn = e.target.closest('[data-custom-use]');
      if (delBtn) {
        e.stopPropagation();
        const id = delBtn.dataset.customDel;
        State.customQuicks = State.customQuicks.filter(c => c.id !== id);
        save();
        renderCustomQuicks();
        return;
      }
      if (useBtn) {
        const secs = parseInt(useBtn.dataset.customUse);
        setCountdownInput(secs);
        State.countdown.remaining = secs;
        State.countdown.duration = secs;
        State.activeTaskId = null;
        State.countdown.running = false;
        render();
        save();
      }
    });

    // 新建组
    document.getElementById('add-group-btn').addEventListener('click', () => openGroupModal());
    document.getElementById('form-add-task').addEventListener('click', () => {
      State._editing.draft.push({ id: uid(), name: '', standard: 0 });
      renderFormTasks();
    });
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-save').addEventListener('click', saveGroup);
    document.getElementById('modal-bg').addEventListener('click', e => {
      if (e.target.id === 'modal-bg') closeModal();
    });
    document.getElementById('form-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveGroup();
      if (e.key === 'Escape') closeModal();
    });

    // 组/任务列表事件委托
    document.getElementById('group-list').addEventListener('click', e => {
      const btn = e.target.closest('button');
      const groupItem = e.target.closest('.group-item');
      const taskEl = e.target.closest('.group-task');
      const addTaskRow = e.target.closest('.add-task-row');
      const head = e.target.closest('.group-head');

      // ↑↓ 调子任务顺序（不依赖 data-action 委托）
      const mvBtn = e.target.closest('[data-mv]');
      if (mvBtn && taskEl) {
        e.stopPropagation();
        if (State.group.active) { toast('任务组进行中，请先停止', 'warn'); return; }
        const idx = +mvBtn.dataset.idx;
        const dir = mvBtn.dataset.mv === 'up' ? -1 : 1;
        const j = idx + dir;
        const g = State.groups.find(x => x.id === groupItem.dataset.groupId);
        if (g && j >= 0 && j < g.tasks.length) {
          [g.tasks[idx], g.tasks[j]] = [g.tasks[j], g.tasks[idx]];
          save();
          render();
        }
        return;
      }

      if (btn && btn.dataset.action) {
        e.stopPropagation();
        const action = btn.dataset.action;
        if (action === 'play-group' && groupItem) {
          // 另一任务组在跑：不允许启动
          if (State.group.active) { toast('任务组进行中，请先停止', 'warn'); return; }
          startGroup(groupItem.dataset.groupId);
        }
        else if (action === 'edit-group' && groupItem) {
          const g = State.groups.find(x => x.id === groupItem.dataset.groupId);
          openGroupModal(g);
        } else if (action === 'del-group' && groupItem) deleteGroup(groupItem.dataset.groupId);
        else if (action === 'edit-task' && taskEl) {
          const found = findTask(taskEl.dataset.taskId);
          if (found) openGroupModal(found.group);
        } else if (action === 'del-task' && taskEl) deleteTask(taskEl.dataset.taskId);
      } else if (taskEl) {
        selectTask(taskEl.dataset.taskId);
      } else if (addTaskRow && groupItem) {
        const g = State.groups.find(x => x.id === groupItem.dataset.groupId);
        openGroupModal(g);
      } else if (head && groupItem && !addTaskRow) {
        // 点击组 header（不是按钮、不是 head-row2 操作区）：仅选中该组
        // 只在 head-row1（名称/统计）或 head 空白处才触发
        if (e.target.classList.contains('group-name') ||
            e.target.classList.contains('group-stats') ||
            e.target.classList.contains('group-head-row1') ||
            e.target === head) {
          selectGroup(groupItem.dataset.groupId);
        }
      }
    });

    // 键盘
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;  // 不抢浏览器/Ctrl 组合
      if (e.key === 'f' || e.key === 'F' || e.key === 'F11') {
        e.preventDefault();
        toggleFullscreen();
      } else if (e.key === '\\') {
        e.preventDefault();
        toggleRightPanel();
      } else if (e.key === ' ') {
        e.preventDefault();
        // 空格按当前 mode 启动/暂停对应的计时器
        if (State.mode === 'countdown') document.getElementById('btn-start').click();
        else if (State.mode === 'stopwatch') document.getElementById('btn-start-sw').click();
        else if (State.mode === 'tasks') document.getElementById('btn-start-grp').click();
      } else if (e.key === 'l' || e.key === 'L') {
        document.getElementById('btn-lap').click();
      } else if (e.key === 'n' || e.key === 'N' || e.key === 'ArrowRight' || e.key === 'End') {
        if (State.mode === 'tasks' && State.group.active) document.getElementById('btn-next-task').click();
      } else if (e.key === 'p' || e.key === 'P' || e.key === 'ArrowLeft' || e.key === 'Home') {
        if (State.mode === 'tasks' && State.group.active) document.getElementById('btn-prev-task').click();
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        if (State.mode === 'tasks') shiftGroup(-1);
      } else if (e.key === 'ArrowDown' || e.key === 'PageDown') {
        if (State.mode === 'tasks') shiftGroup(1);
      } else if (e.key === '1') setMode('countdown');
      else if (e.key === '2') setMode('stopwatch');
      else if (e.key === '3') setMode('tasks');
    });
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.().catch(e => toast('全屏失败：' + e.message, 'warn'));
    } else {
      document.exitFullscreen?.();
    }
  }

  // 右栏折叠/展开（所有 mode 都生效）
  function toggleRightPanel() {
    const main = document.getElementById('main');
    const btn = document.getElementById('btn-toggle-right');
    const collapsed = main.classList.toggle('right-collapsed');
    btn.textContent = collapsed ? '◀' : '▶';
    btn.title = collapsed ? '显示右栏 (\\)' : '隐藏右栏 (\\)';
    try { localStorage.setItem('right-collapsed', collapsed ? '1' : '0'); } catch (e) {}
  }

  // ============== 时钟 + 主循环 ==============
  function clockTick() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('clock-time').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('clock-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
  }
  function mainLoop() {
    tickCountdown();
    updateLive();
    updateGroupActuals();
    requestAnimationFrame(mainLoop);
  }

  // 高频更新任务组用时文本（不重渲染右栏）
  function updateGroupActuals() {
    if (!State.group.active && !hasAnyActual()) return;
    // 各子任务的实际用时（0.1 秒精度，流畅变化）
    const items = document.querySelectorAll('.group-task[data-task-id]');
    items.forEach(item => {
      const id = item.dataset.taskId;
      const actualEl = item.querySelector('.group-task-actual');
      if (!actualEl) return;
      const a = State.actualTimes[id];
      if (a === undefined) {
        actualEl.textContent = '--:--';
      } else {
        actualEl.textContent = fmtTime(a);
      }
    });
    // 同步 .group-summary 的“实际 / 差异”（在 group-item 内部）
    document.querySelectorAll('.group-summary[data-group-id]').forEach(box => {
      const gid = box.dataset.groupId;
      const g = State.groups.find(x => x.id === gid);
      if (!g) return;
      let stdTotal = 0, actTotal = 0;
      g.tasks.forEach(t => {
        stdTotal += t.standard;
        actTotal += (State.actualTimes[t.id] || 0);
      });
      const actualEl = box.querySelector('.summary-actual');
      const diffEl = box.querySelector('.summary-diff');
      if (actualEl) actualEl.textContent = actTotal > 0 ? fmtTime(actTotal) : '--';
      if (diffEl) {
        const diff = actTotal - stdTotal;
        if (actTotal < 0.05) {
          diffEl.textContent = '—';
          diffEl.className = 'summary-value summary-diff';
        } else if (Math.abs(diff) < 0.1) {
          diffEl.textContent = '± 0.0';
          diffEl.className = 'summary-value summary-diff';
        } else {
          const sign = diff > 0 ? '+' : '−';
          diffEl.textContent = `${sign} ${fmtTime(Math.abs(diff))}`;
          diffEl.className = 'summary-value summary-diff ' + (diff > 0 ? 'diff-over' : 'diff-under');
        }
      }
    });
  }
  function hasAnyActual() {
    for (const k in State.actualTimes) {
      if (State.actualTimes[k] > 0) return true;
    }
    return false;
  }
  // 续点提示逻辑
  function showResumePromptIfNeeded() {
    if (hasAnyActual()) {
      document.getElementById('modal-bg-resume').classList.add('show');
    }
  }
  // 绑定续点提示按钮
  document.getElementById('btn-resume-keep').addEventListener('click', () => {
    document.getElementById('modal-bg-resume').classList.remove('show');
    // 刷新前 group/countdown 状态已由 load 恢复（默认暂停），切到 tasks 模式后
    // 重新绑定 group.tasks 引用 + 重算 itemRemaining（防止 taskId 重生后标准值/累加值已变）
    if (State.group.active && State.group.groupId) {
      const g = State.groups.find(x => x.id === State.group.groupId);
      if (g && g.tasks.length) {
        State.group.tasks = g.tasks;
        State.group.currentIndex = Math.min(State.group.currentIndex, g.tasks.length - 1);
        const cur = g.tasks[State.group.currentIndex];
        if (cur) {
          State.group.itemDuration = cur.standard;
          const elapsed = State.actualTimes[cur.id] || 0;
          State.group.itemRemaining = Math.max(0, cur.standard - elapsed);
          State.group.overtime = elapsed >= cur.standard;
          State.activeTaskId = cur.id;
        }
      }
    }
    if (State.mode !== 'tasks') setMode('tasks');
    else render();
    save();
  });
  document.getElementById('btn-resume-clear').addEventListener('click', () => {
    State.actualTimes = {};
    State.group.groupId = null;
    State.group.active = false;
    State.group.running = false;
    State.group.currentIndex = 0;
    State.group.overtime = false;
    State.group.itemRemaining = 0;
    State.group.itemDuration = 0;
    State.activeTaskId = null;
    State.countdown.remaining = 0;
    State.countdown.running = false;
    document.getElementById('modal-bg-resume').classList.remove('show');
    if (State.mode !== 'tasks') setMode('tasks');
    else { render(); save(); }
  });

  // 高频更新：只动需要动的小区域（避免整个 DOM 重建）
  function updateLive() {
    // 倒计时 / 任务组模式的实际用时、倒计时数字、overtime
    if (State.mode === 'countdown' || State.mode === 'tasks') {
      const timeEl = document.getElementById('display-time');
      const progress = document.getElementById('progress');
      const progressBar = document.getElementById('progress-bar');
      // tasks tab：使用任务组独立的 itemRemaining 渲染（与倒计时完全隔离）
      if (State.mode === 'tasks' && State.group.active) {
        timeEl.innerHTML = fmtTime(State.group.itemRemaining);
        let timeCls = 'display-time';
        if (State.group.overtime) timeCls += ' overtime-running';
        else if (State.group.itemRemaining < 10 && State.group.itemRemaining > 0) timeCls += ' warn';
        if (!State.group.running) timeCls += ' paused';
        timeEl.className = timeCls;
        if (State.group.itemDuration > 0 && progress.style.display !== 'none') {
          const rawPct = ((State.group.itemDuration - State.group.itemRemaining) / State.group.itemDuration) * 100;
          progressBar.style.width = Math.min(100, rawPct) + '%';
        }
      }
      // countdown tab：使用普通倒计时的 remaining（与任务组完全隔离）
      else if (State.countdown.running) {
        timeEl.innerHTML = fmtTime(State.countdown.remaining);
        let timeCls = 'display-time';
        if (State.countdown.remaining < 10 && State.countdown.remaining > 0) timeCls += ' warn';
        timeEl.className = timeCls;
        if (State.countdown.duration > 0 && progress.style.display !== 'none') {
          const rawPct = ((State.countdown.duration - State.countdown.remaining) / State.countdown.duration) * 100;
          progressBar.style.width = Math.min(100, rawPct) + '%';
        }
      }
      // countdown tab 暂停中：保持进度条按已完成比例显示
      else if (State.countdown.remaining > 0 && State.countdown.remaining < State.countdown.duration && !State.countdown.finished) {
        timeEl.innerHTML = fmtTime(State.countdown.remaining);
        timeEl.className = 'display-time paused';
        if (State.countdown.duration > 0) {
          progress.style.display = 'block';
          const usedPct = ((State.countdown.duration - State.countdown.remaining) / State.countdown.duration) * 100;
          progressBar.style.width = Math.min(100, usedPct) + '%';
        }
      }
      // 任务组实际用时（仅在 tasks tab 显示）
      if (State.group.active && State.mode === 'tasks') {
        const actualEl = document.getElementById('display-actual');
        const cur = State.group.tasks[State.group.currentIndex];
        if (cur && State.actualTimes[cur.id] !== undefined) {
          let cls = 'display-actual';
          if (State.group.running) cls += ' live';
          if (State.group.overtime) cls = 'display-actual overtime-val';
          actualEl.textContent = `实际用时 ${fmtTime(State.actualTimes[cur.id])}`;
          actualEl.className = cls;
          actualEl.style.display = 'block';
        }
      } else {
        // countdown / stopwatch tab：隐藏“实际用时”避免污染
        const actualEl = document.getElementById('display-actual');
        if (actualEl) actualEl.style.display = 'none';
      }
        // overtime 提示
        if (State.group.overtime) {
          const overEl = document.getElementById('display-overtime');
          overEl.textContent = `⏱ 已超时 ${fmtTime(Math.max(0, -State.countdown.remaining))}`;
          overEl.style.display = 'block';
        }
    }
    // 任务组模式：更新开始/暂停按钮文字（用任务组独立的 running 标志）
    if (State.mode === 'tasks' && State.group.active) {
      const grpStart = document.getElementById('btn-start-grp');
      const newText = State.group.running ? '⏸ 暂停' : (State.group.itemRemaining > 0 ? '▶ 继续' : '▶ 开始');
      if (grpStart.textContent.trim() !== newText.replace(/[⏸▶]/g, '').trim()) {
        grpStart.innerHTML = newText;
        grpStart.classList.toggle('running', State.group.running);
      }
    }
    // 倒计时模式：更新开始/暂停按钮文字
    if (State.mode === 'countdown') {
      const startBtn = document.getElementById('btn-start');
      let newText;
      if (State.countdown.finished) newText = '▶ 重新开始';
      else if (State.countdown.running) newText = '⏸ 暂停';
      else if (State.countdown.remaining < State.countdown.duration) newText = '▶ 继续';
      else newText = '▶ 开始';
      if (startBtn.textContent.trim() !== newText.replace(/[⏸▶]/g, '').trim()) {
        startBtn.innerHTML = newText;
        startBtn.classList.toggle('running', State.countdown.running);
      }
    }
    // 秒表
    if (State.mode === 'stopwatch') {
      const swStart = document.getElementById('btn-start-sw');
      let newText;
      if (State.stopwatch.running) newText = '⏸ 暂停';
      else if (State.stopwatch.elapsed > 0) newText = '▶ 继续';
      else newText = '▶ 开始';
      if (swStart.textContent.trim() !== newText.replace(/[⏸▶]/g, '').trim()) {
        swStart.innerHTML = newText;
        swStart.classList.toggle('running', State.stopwatch.running);
      }
      if (State.stopwatch.running) {
        document.getElementById('display-time').innerHTML = fmtTimeMs(getStopwatchDisplayMs());
      }
    }
  }

  // ============== 启动 ==============
  // 主题初始化：优先用户选择 > 跟随系统
  function applyTheme(theme, userChose) {
    document.documentElement.dataset.theme = theme;
    if (userChose) localStorage.setItem('theme', theme);
    const btn = document.getElementById('btn-theme');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }
  (function initTheme() {
    const stored = localStorage.getItem('theme');
    if (stored === 'light' || stored === 'dark') {
      applyTheme(stored);
    } else {
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      applyTheme(mql.matches ? 'dark' : 'light');
      mql.addEventListener('change', e => {
        if (!localStorage.getItem('theme')) {
          applyTheme(e.matches ? 'dark' : 'light');
        }
      });
    }
  })();

  load();
  bind();
  clockTick();
  setInterval(clockTick, 1000);
  // 恢复右栏折叠状态
  try {
    if (localStorage.getItem('right-collapsed') === '1') {
      document.getElementById('main').classList.add('right-collapsed');
      const btn = document.getElementById('btn-toggle-right');
      if (btn) { btn.textContent = '◀'; btn.title = '显示右栏 (\\)'; }
    } else {
      const btn = document.getElementById('btn-toggle-right');
      if (btn) { btn.textContent = '▶'; btn.title = '隐藏右栏 (\\)'; }
    }
  } catch (e) {}
  render();
  mainLoop();
  // 续点提示：加载后检测是否有未完成的 actualTimes
  if (hasAnyActual()) {
    document.getElementById('modal-bg-resume').classList.add('show');
  }
  </script>
</body>
</html>
